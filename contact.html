<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTACT | Pete's Bread</title>
  <meta name="description" content="Contact Pete's Bread microbakery on Northern Ireland's Causeway Coast." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header" id="site-header">
    <nav class="nav-inner">
      <a href="index.html" class="logo-link">
        <img src="images/PB_LOGO.png" alt="Pete's Bread" class="logo-img" />
      </a>
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="bakes.html">BAKES</a></li>
        <li><a href="classes.html">CLASSES</a></li>
        <li><a href="contact.html" class="active">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <div class="page-content">

    <div class="contact-body">
      <h3>Contact Pete's Bread:</h3>

      <!-- Sign up at formspree.io and replace YOUR_FORM_ID with your real form ID -->
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="message">Write a message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn-submit">Submit</button>
        <p class="form-status" id="form-status"></p>
      </form>

      <div class="contact-also">
        <p>You can also find us via <a href="https://www.peatlandscausewaycoast.com/" target="_blank" rel="noopener">Peatlands Causeway Coast</a>.</p>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <img src="images/PB_LOGO.png" alt="Pete's Bread" class="footer-logo" />
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="bakes.html">Bakes</a>
        <a href="classes.html">Classes</a>
        <a href="contact.html">Contact</a>
      </nav>
      <p class="footer-copy">&copy; 2025, Pete's Bread&nbsp; All rights reserved</p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
